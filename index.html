<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting to new portfolio...</title>
    <!-- Redirect to Netlify -->
    <meta http-equiv="refresh" content="0; url=https://samyjoe.netlify.app">

      window.location.replace("https://samyjoe.netlify.app" + window.location.search + window.location.hash);

    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

        height: 100vh;
        margin: 0;
        background-color: #0f172a;
        color: #f8fafc;
      }
      a { color: #38bdf8; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <p>This portfolio has moved. If you are not redirected automatically, <a href="https://samyjoe.netlify.app">click here</a>.</p>
  </body>
</html>
